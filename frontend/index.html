<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overseer</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- Login view -->
  <section id="login-view" class="view hidden">
    <div class="login-box">
      <h1>Overseer</h1>
      <p class="subtitle">Claude Code Remote Operations Console</p>
      <a class="btn btn-primary" href="/auth/github">Log in with GitHub</a>
    </div>
  </section>

  <!-- Dashboard view -->
  <section id="dashboard-view" class="view hidden">
    <header class="topbar">
      <div class="topbar-left">
        <h1>Overseer</h1>
        <span id="agent-badge" class="badge badge-unknown">Agent: ?</span>
      </div>
      <div class="topbar-right">
        <span id="user-label"></span>
        <button id="logout-btn" class="btn">Log out</button>
      </div>
    </header>

    <main class="layout">
      <!-- Session list -->
      <div class="sidebar">
        <h2>Sessions</h2>
        <ul id="session-list" class="session-list"></ul>
        <p id="empty-hint" class="hint hidden">No sessions are being monitored.</p>
      </div>

      <!-- Session detail -->
      <div class="detail">
        <div id="detail-empty" class="detail-empty">
          Select a session from the list on the left.
        </div>
        <div id="detail-content" class="hidden">
          <div class="detail-header">
            <h2 id="detail-name"></h2>
            <span id="detail-status" class="badge"></span>
          </div>
          <div class="detail-meta">
            <span id="detail-category"></span>
            <span id="detail-updated"></span>
          </div>
          <div id="action-bar" class="action-bar hidden"></div>
          <p id="action-status" class="hint"></p>
          <pre id="snapshot" class="snapshot"></pre>
          <p id="snapshot-meta" class="hint"></p>
        </div>
      </div>
    </main>
  </section>

  <script src="/app.js"></script>
</body>
</html>
