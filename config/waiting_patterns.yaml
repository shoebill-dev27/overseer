# Detection patterns for Claude Code WAITING state
# Can be added/changed without restarting the Agent (hot-reloaded every 60s)
#
# Future work: consider migrating if Claude Code provides an official status API

patterns:
  # Approval
  - name: approval_proceed
    regex: "Do you want to proceed\\?"
    category: APPROVAL

  - name: approval_continue
    regex: "Do you want to continue\\?"
    category: APPROVAL

  # Selection
  - name: option_which
    regex: "Which option\\?"
    category: SELECTION

  - name: option_select
    regex: "Select an option"
    category: SELECTION

  - name: option_numbered
    regex: "^\\s*1\\."
    category: SELECTION

  # Confirmation
  - name: yes_no_upper
    regex: "\\[Y/n\\]"
    category: CONFIRMATION

  - name: yes_no_lower
    regex: "\\[y/N\\]"
    category: CONFIRMATION

  - name: yes_no_word
    regex: "\\(yes/no\\)"
    category: CONFIRMATION

  - name: press_enter
    regex: "Press Enter to continue"
    category: CONFIRMATION

  # Question / clarification
  - name: clarification
    regex: "Need clarification"
    category: CLARIFICATION

  - name: question_mark_end
    regex: "\\?\\s*$"
    category: CLARIFICATION
