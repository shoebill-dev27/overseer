# Local Agent configuration

monitoring:
  # Prefix of tmux sessions to monitor (prefix match)
  session_prefix: "claude-"
  # tmux capture-pane poll interval (seconds)
  poll_interval_seconds: 10
  # Number of lines to capture with capture-pane
  capture_lines: 300
  # Hot-reload interval for waiting_patterns.yaml (seconds)
  pattern_reload_seconds: 60

backend:
  # FastAPI backend URL (fixed to localhost)
  url: "http://127.0.0.1:8000"
  # Heartbeat send interval (seconds)
  heartbeat_interval_seconds: 60
  # Request timeout (seconds)
  request_timeout_seconds: 5

notification:
  # Suppress re-notification for the same session (seconds)
  cooldown_seconds: 1800  # 30 minutes

actions:
  # Actions enabled in Phase 2
  STOP: true
  SEND_Y: true
  SEND_N: true
  SEND_ENTER: true
  # Arbitrary text send. Enabled by default. This lets the browser send arbitrary
  # strings to tmux, so OPERATOR or higher and two-step confirmation are always
  # required. Set it to false to disable arbitrary text send as an operational decision.
  SEND_TEXT: true
